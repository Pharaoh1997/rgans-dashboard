<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R-GANS PREMIER - Luxury Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        rgans: {
                            bg: '#050b14', /* Darker cinematic background */
                            card: 'rgba(15, 23, 42, 0.4)', 
                            border: 'rgba(255, 255, 255, 0.08)',
                            text: '#f8fafc', muted: '#94a3b8', 
                            cyan: '#00f0ff', gold: '#ffd700', green: '#00ffa3', red: '#ff2a2a', purple: '#b52aff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ╔══════════════════════════════════════════════════════════╗
           ║   LUXURY GLASSMORPHISM TOKENS & CINEMATIC LIGHTING       ║
           ╚══════════════════════════════════════════════════════════╝ */
        :root {
            --cyan-glow: rgba(0, 240, 255, 0.4);   --cyan-dim: rgba(0, 240, 255, 0.1);
            --gold-glow: rgba(255, 215, 0, 0.4);   --gold-dim: rgba(255, 215, 0, 0.1);
            --green-glow: rgba(0, 255, 163, 0.4);  --green-dim: rgba(0, 255, 163, 0.1);
            --red-glow: rgba(255, 42, 42, 0.4);    --red-dim: rgba(255, 42, 42, 0.1);
            --purple-glow: rgba(181, 42, 255, 0.4);--purple-dim: rgba(181, 42, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
        }

        /* Cinematic Studio Background */
        body { 
            background: radial-gradient(circle at 50% 0%, #111827 0%, #050b14 70%);
            color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ALIGNMENT & CENTERING UNTUK HP */
        #wadah-ps {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; min-height: 100%; gap: 2rem; position: relative; z-index: 10;
        }
        
        @media (max-width: 768px) {
            .mobile-fullscreen { min-height: 85vh; justify-content: center; }
            .stn-card { width: 90vw !important; max-width: 400px; margin: 0 auto; }
        }

        /* ╔══════════════════════════════════════════════════════════╗
           ║   ANIMASI HD MEWAH                                       ║
           ╚══════════════════════════════════════════════════════════╝ */
        @keyframes borderSpin { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes timerPulse { 0%,100% { filter: drop-shadow(0 0 15px currentColor) brightness(1); } 50% { filter: drop-shadow(0 0 35px currentColor) brightness(1.3); } }
        @keyframes glassShimmer { 
            0% { transform: translateX(-150%) skewX(-45deg); opacity: 0; } 
            50% { opacity: 0.1; }
            100% { transform: translateX(150%) skewX(-45deg); opacity: 0; } 
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* KARTU LUXURY GLASSMORPHISM */
        .stn-card {
            position: relative; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column;
            min-height: 440px; 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all .5s cubic-bezier(.4,0,.2,1);
            user-select: none; margin-bottom: 20px;
        }

        /* Ambient Glow di belakang kartu */
        .stn-card::before {
            content: ''; position: absolute; inset: -20px; z-index: -1; border-radius: 40px;
            filter: blur(40px); opacity: 0.5; transition: all .5s; pointer-events: none;
        }
        .stn-card.st-idle::before { background: rgba(0,0,0,0.5); }
        .stn-card.st-running-belum::before { background: var(--cyan-dim); }
        .stn-card.st-running-lunas::before { background: var(--green-dim); }
        .stn-card.st-running-bebas::before { background: var(--purple-dim); }
        .stn-card.st-timeup::before { background: var(--red-dim); animation: timerPulse 1s infinite; }

        /* Kilauan Kaca (Shimmer) berjalan tiap 6 detik */
        .stn-shimmer {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            z-index: 5; pointer-events: none; opacity: 0;
            animation: glassShimmer 6s infinite ease-in-out;
        }

        /* Border Animasi Elegan */
        .stn-border {
            position: absolute; inset: 0; border-radius: inherit; padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(0,0,0,0));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none; z-index: 2; transition: all .5s;
        }
        
        .stn-card.st-running-belum .stn-border { background: linear-gradient(90deg, transparent, #00f0ff, transparent); background-size: 200% 100%; animation: borderSpin 3s linear infinite; }
        .stn-card.st-running-lunas .stn-border { background: linear-gradient(90deg, transparent, #00ffa3, transparent); background-size: 200% 100%; animation: borderSpin 3s linear infinite; }
        .stn-card.st-running-bebas .stn-border { background: linear-gradient(90deg, transparent, #b52aff, transparent); background-size: 200% 100%; animation: borderSpin 3s linear infinite; }
        .stn-card.st-timeup .stn-border { background: linear-gradient(90deg, transparent, #ff2a2a, transparent); background-size: 200% 100%; animation: borderSpin 1.5s linear infinite; }

        /* Header Station - HD Text */
        .stn-name {
            font-size: 28px; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Timer Area - Cinematic Digits */
        .stn-timer-wrap {
            position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; align-items: center;
            margin: 10px 20px; padding: 30px 10px; border-radius: 20px;
            background: rgba(0,0,0,0.2); box-shadow: inset 0 2px 15px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: all .5s;
        }

        .stn-timer-digits {
            font-family:'JetBrains Mono',monospace; font-size: 58px; font-weight: 900; 
            letter-spacing: 2px; line-height: 1; font-variant-numeric: tabular-nums; 
            margin: 15px 0; transition: color .5s, filter .5s;
        }
        
        .stn-card.st-idle .stn-timer-digits { color: #475569; }
        .stn-card.st-running-belum .stn-timer-digits { color: #00f0ff; filter: drop-shadow(0 0 20px var(--cyan-glow)); animation: timerPulse 3s ease-in-out infinite; }
        .stn-card.st-running-lunas .stn-timer-digits { color: #00ffa3; filter: drop-shadow(0 0 20px var(--green-glow)); animation: timerPulse 3s ease-in-out infinite; }
        .stn-card.st-running-bebas .stn-timer-digits { color: #b52aff; filter: drop-shadow(0 0 20px var(--purple-glow)); animation: timerPulse 3s ease-in-out infinite; }
        .stn-card.st-timeup .stn-timer-digits { color: #ff2a2a; filter: drop-shadow(0 0 20px var(--red-glow)); animation: timerPulse 0.8s ease-in-out infinite; }

        /* Tag Label Mewah */
        .stn-mode-tag {
            display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:6px 16px; border-radius:12px;
            font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px; 
            backdrop-filter: blur(10px); transition:all .5s; margin: 0 auto;
        }
        .stn-card.st-idle .stn-mode-tag { background: rgba(255,255,255,0.05); color: var(--muted-color); border: 1px solid rgba(255,255,255,0.1); }
        .stn-card.st-running-belum .stn-mode-tag { background: var(--cyan-dim); color: #00f0ff; border: 1px solid rgba(0,240,255,0.3); box-shadow: 0 4px 15px var(--cyan-dim); }
        .stn-card.st-running-lunas .stn-mode-tag { background: var(--green-dim); color: #00ffa3; border: 1px solid rgba(0,255,163,0.3); box-shadow: 0 4px 15px var(--green-dim); }
        .stn-card.st-running-bebas .stn-mode-tag { background: var(--purple-dim); color: #b52aff; border: 1px solid rgba(181,42,255,0.3); box-shadow: 0 4px 15px var(--purple-dim); }
        .stn-card.st-timeup .stn-mode-tag { background: var(--red-dim); color: #ff2a2a; border: 1px solid rgba(255,42,42,0.4); box-shadow: 0 4px 15px var(--red-dim); }

        /* Billing Area */
        .stn-billing {
            position:relative; z-index:3; margin: 5px 20px 20px; padding: 20px; border-radius: 20px;
            display:flex; align-items:center; justify-content:space-between;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: all .5s;
        }

        .stn-billing-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2.5px; color:#64748b; margin-bottom:4px; display: block;}
        .stn-billing-val { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:900; transition: color .5s; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .stn-card.st-idle .stn-billing-val { color: #64748b; }
        .stn-card.st-running-belum .stn-billing-val { color: #00f0ff; }
        .stn-card.st-running-lunas .stn-billing-val { color: #00ffa3; }
        .stn-card.st-running-bebas .stn-billing-val { color: #b52aff; }
        .stn-card.st-timeup .stn-billing-val { color: #ff2a2a; }

        .badge-front { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border: 1px solid transparent; display: inline-block;}
        .badge-lunas { background: rgba(0,255,163,0.1); color: #00ffa3; border-color: rgba(0,255,163,0.3); }
        .badge-belum { background: rgba(255,42,42,0.1); color: #ff2a2a; border-color: rgba(255,42,42,0.3); }
        .badge-bebas { background: rgba(181,42,255,0.1); color: #b52aff; border-color: rgba(181,42,255,0.3); }
        .badge-idle { background: rgba(255,255,255,0.02); color: #64748b; border-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans">

    <!-- Header Glassmorphism -->
    <header class="border-b border-white/5 bg-[#050b14]/60 backdrop-blur-xl sticky top-0 z-20 p-5 shrink-0 flex justify-between items-center shadow-2xl w-full">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#00f0ff] to-[#0066ff] p-[1px] shadow-[0_0_20px_rgba(0,240,255,0.3)]">
                <div class="w-full h-full bg-[#050b14] rounded-xl flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-[#00f0ff] opacity-10"></div>
                    <span class="text-[#00f0ff] text-2xl font-black relative z-10">R</span>
                </div>
            </div>
            <div>
                <h1 class="text-white font-black text-xl tracking-tighter leading-none">R-GANS <span class="text-[#00f0ff]">PREMIER</span></h1>
                <p class="text-[10px] text-rgans-muted font-bold uppercase tracking-[0.2em] mt-1.5">VIP Monitor</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-[#00ffa3] font-black uppercase mb-1 tracking-widest" id="connection-status">● CONNECTED</p>
            <p class="text-lg font-mono font-black text-white leading-none drop-shadow-md" id="jam-digital">00:00:00</p>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 hide-scroll flex flex-col items-center justify-center w-full relative">
        <div id="alert-no-unit" class="hidden bg-red-900/40 border border-red-500/30 backdrop-blur-md text-white p-5 rounded-2xl text-center mb-6 shadow-2xl absolute top-6 max-w-md w-[90%] z-20">
            <p class="font-black text-sm tracking-wide">MENAMPILKAN SEMUA UNIT</p>
            <p class="text-[11px] text-red-200/60 mt-1.5 tracking-wider">Untuk tampilan spesifik, scan QR Code di meja.</p>
        </div>

        <div id="wadah-ps"></div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAD47-malAVNF0pvG-zb68VSlPT4KftU4",
            authDomain: "rgans-premier.firebaseapp.com",
            databaseURL: "https://rgans-premier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rgans-premier",
            storageBucket: "rgans-premier.firebasestorage.app",
            messagingSenderId: "483724142361",
            appId: "1:483724142361:web:18517acb9e31a2962e4788"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let activeTimers = {};
        let stationsData = {}; 

        const urlParams = new URLSearchParams(window.location.search);
        const targetUnit = urlParams.get('unit'); 

        setInterval(() => { 
            const el = document.getElementById('jam-digital');
            if(el) el.innerText = new Date().toLocaleTimeString('id-ID', { hour12: false }); 
        }, 1000);

        class PSBoxViewer {
            constructor(name) { this.name = name; }
            render() {
                const kotak = document.createElement('div');
                kotak.className = `stn-card st-idle w-full max-w-[420px] mx-auto`;
                kotak.id = `box-${this.name}`;
                kotak.innerHTML = `
                    <div class="stn-border"></div>
                    <div class="stn-shimmer"></div>

                        <div class="relative z-[3] px-6 pt-8 pb-2 flex flex-col items-center justify-center">
                            <h2 class="stn-name uppercase">${this.name}</h2>
                        </div>

                        <div class="stn-timer-wrap">
                            <span class="member-label text-[11px] font-black text-white/50 tracking-[0.3em] uppercase truncate px-4 mb-2">MEMBER VIP</span>
                            <div id="timer-${this.name}" class="stn-timer-digits">00:00:00</div>
                            <div class="stn-mode-tag mode-label">IDLE</div>
                        </div>

                        <div class="stn-billing">
                            <div class="flex flex-col">
                                <span class="stn-billing-label">Total Tagihan</span>
                                <span id="harga-${this.name}" class="stn-billing-val">Rp 0</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="stn-billing-label">Mulai: <span class="jam-mulai text-white/80 font-mono text-xs">--:--</span></span>
                                <span class="lunas-label badge-front badge-idle mt-1.5">STANDBY</span>
                            </div>
                        </div>
                `;
                return kotak;
            }
        }

        class ViewerManager {
            constructor() {
                this.wadah = document.getElementById('wadah-ps');
                this.setupFirebase();
                
                if(!targetUnit) {
                    document.getElementById('alert-no-unit').classList.remove('hidden');
                }
            }

            setupFirebase() {
                db.ref('.info/connected').on('value', s => {
                    const el = document.getElementById('connection-status');
                    if(el) {
                        el.innerText = s.val() ? '● LIVE CONNECTED' : '● OFFLINE';
                        el.className = s.val() ? 'text-[10px] font-black tracking-widest text-[#00ffa3] uppercase mb-1 drop-shadow-[0_0_8px_rgba(0,255,163,0.5)]' : 'text-[10px] font-black tracking-widest text-[#ff2a2a] uppercase mb-1 drop-shadow-[0_0_8px_rgba(255,42,42,0.5)]';
                    }
                });

                db.ref('dashboard_rgans').on('value', snap => {
                    stationsData = snap.val(); 
                    if (!stationsData) {
                        this.wadah.innerHTML = '<p class="text-slate-500 font-bold tracking-widest text-sm text-center col-span-full">NO DATA AVAILABLE</p>'; 
                        return;
                    }
                    
                    const urutan = Object.keys(stationsData).sort((a, b) => {
                        const isStationA = a.toUpperCase().startsWith('STATION');
                        const isStationB = b.toUpperCase().startsWith('STATION');
                        if (isStationA && !isStationB) return -1;
                        if (!isStationA && isStationB) return 1;
                        return a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'});
                    });

                    urutan.forEach((n) => {
                        if (targetUnit && n.toLowerCase() !== targetUnit.toLowerCase()) return;

                        let k = document.getElementById(`box-${n}`);
                        if (!k) {
                            k = (new PSBoxViewer(n)).render(); 
                            this.wadah.appendChild(k);
                        }
                        this.syncBoxUI(n, stationsData[n], k);
                    });
                });
            }

            syncBoxUI(n, info, kotak) {
                if (!kotak || !info) return;
                
                const mem = kotak.querySelector('.member-label');
                const mod = kotak.querySelector('.mode-label');
                const jam = kotak.querySelector('.jam-mulai');
                const lunas = kotak.querySelector('.lunas-label');
                const tim = document.getElementById(`timer-${n}`);
                const hargaEl = document.getElementById(`harga-${n}`);

                kotak.classList.remove('st-idle', 'st-running-belum', 'st-running-lunas', 'st-running-bebas', 'st-timeup');

                if (info.running) {
                    const isBebas = info.mode && info.mode.toUpperCase() === 'BEBAS';
                    
                    if (info.is_time_up) {
                        kotak.classList.add('st-timeup');
                    } else if (isBebas) {
                        kotak.classList.add('st-running-bebas');
                    } else if (info.lunas) {
                        kotak.classList.add('st-running-lunas');
                    } else {
                        kotak.classList.add('st-running-belum');
                    }

                    mem.innerText = info.customer || 'TAMU REGULER'; 
                    mod.innerText = info.mode || 'PAKET';
                    
                    jam.innerText = info.start_time_iso ? info.start_time_iso.substring(11, 16) : '--:--';
                    if (hargaEl) hargaEl.innerText = `Rp ${parseInt(info.total_sementara || 0).toLocaleString('id-ID')}`;

                    if(lunas) {
                        if (isBebas) {
                            lunas.innerText = "OPEN BILLING";
                            lunas.className = "lunas-label badge-front badge-bebas mt-1.5";
                        } else {
                            lunas.innerText = info.lunas ? "LUNAS" : "BELUM BAYAR";
                            lunas.className = `lunas-label badge-front mt-1.5 ${info.lunas ? 'badge-lunas' : 'badge-belum'}`;
                        }
                    }

                    this.runTimer(n, info);
                } else {
                    kotak.classList.add('st-idle');
                    
                    mem.innerText = 'UNIT KOSONG'; 
                    mod.innerText = 'IDLE'; 
                    jam.innerText = '--:--';
                    
                    if(lunas) { lunas.innerText = "STANDBY"; lunas.className = "lunas-label badge-front badge-idle mt-1.5"; }
                    if(hargaEl) hargaEl.innerText = "Rp 0";
                    
                    if (activeTimers[n]) { clearInterval(activeTimers[n]); delete activeTimers[n]; }
                    if(tim) { tim.innerText = "00:00:00"; }
                }
            }

            runTimer(n, info) {
                if (activeTimers[n]) clearInterval(activeTimers[n]);
                const el = document.getElementById(`timer-${n}`);
                if(!el || !info.start_time_iso) return;
                
                activeTimers[n] = setInterval(() => {
                    const now = new Date().getTime();
                    const start = new Date(info.start_time_iso).getTime();
                    const end = info.end_time_iso ? new Date(info.end_time_iso).getTime() : 0; 
                    
                    let diff = (end > 0) ? end - now : now - start;

                    if (diff <= 0 && end > 0) { el.innerText = "00:00:00"; return; }
                    
                    const absD = Math.abs(diff);
                    const h = Math.floor(absD/3600000).toString().padStart(2,'0');
                    const m = Math.floor((absD%3600000)/60000).toString().padStart(2,'0');
                    const s = Math.floor((absD%60000)/1000).toString().padStart(2,'0');
                    el.innerText = `${h}:${m}:${s}`;
                }, 1000);
            }
        }

        window.onload = () => {
            window.R_GANS_VIEWER = new ViewerManager();
        };
    </script>
</body>
</html>
